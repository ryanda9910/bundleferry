<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="bundleferry">
  <rect width="128" height="128" rx="28" fill="#0D0F12"/>
  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" stroke="#34D399" stroke-opacity="0.18"/>
  <!-- a ferry carrying a cargo box (the bundle) across water: migrate without sinking -->
  <!-- water line -->
  <path d="M20 92 q11 -7 22 0 t22 0 t22 0 t22 0" stroke="#34D399" stroke-width="4" stroke-linecap="round" fill="none" stroke-opacity="0.55"/>
  <path d="M20 102 q11 -7 22 0 t22 0 t22 0 t22 0" stroke="#34D399" stroke-width="4" stroke-linecap="round" fill="none" stroke-opacity="0.3"/>
  <!-- hull -->
  <path d="M34 74 h60 l-9 14 H43 z" fill="#0D0F12" stroke="#34D399" stroke-width="6" stroke-linejoin="round"/>
  <!-- cargo box on deck (the bundle being ferried) -->
  <rect x="52" y="50" width="24" height="24" rx="3" fill="none" stroke="#FBBF24" stroke-width="6"/>
  <path d="M52 62 h24 M64 50 v24" stroke="#FBBF24" stroke-width="4" stroke-opacity="0.7"/>
  <!-- mast / direction of travel -->
  <path d="M88 50 l10 6 -10 6 z" fill="#34D399"/>
  <path d="M64 50 v-8" stroke="#34D399" stroke-width="5" stroke-linecap="round"/>
</svg>
